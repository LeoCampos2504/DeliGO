<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" />
  <!-- Delivery bag icon -->
  <g transform="translate(256,256)">
    <!-- Bag body -->
    <path d="M-80,-40 L-80,80 Q-80,110 -50,110 L50,110 Q80,110 80,80 L80,-40 Z" fill="white" opacity="0.95"/>
    <!-- Bag handle -->
    <path d="M-40,-40 Q-40,-80 0,-80 Q40,-80 40,-40" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
    <!-- Speed lines -->
    <line x1="-140" y1="0" x2="-110" y2="0" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    <line x1="-150" y1="30" x2="-115" y2="30" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="-140" y1="60" x2="-120" y2="60" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <!-- Checkmark inside bag -->
    <path d="M-20,20 L-5,40 L25,-5" fill="none" stroke="#FB8C00" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
